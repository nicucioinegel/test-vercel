<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suntem online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #16a34a 0%, #0891b2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    .status-badge {
      display: inline-block;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .status-badge::before {
      content: '● ';
      color: #86efac;
      animation: pulse 1.5s infinite;
    }

    .main-title {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow:
        0 0 60px rgba(255,255,255,0.35),
        0 2px 20px rgba(0,0,0,0.15);
    }

    .sub-title {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-top: 1.2rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="status-badge">Suntem online</div>
    <h1 class="main-title">Uraaaa!</h1>
    <p class="sub-title">live &amp; running</p>
  </div>
</body>
</html>
